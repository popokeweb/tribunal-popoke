<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribunal PoPoke</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --red: #E24B4A; --bg: #0e0e0e; --bg2: #161616; --bg3: #1e1e1e;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0; --text2: #888; --text3: #555; --accent: #f5c842;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.header { border-bottom: 1px solid var(--border); padding: 2rem 2rem 1.5rem; display: flex; align-items: flex-end; gap: 1rem; flex-wrap: wrap; }
.header-title { flex: 1; }
.header-title h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 2px; line-height: 1; }
.header-title h1 span { color: var(--accent); }
.header-title p { font-size: 13px; color: var(--text2); margin-top: 4px; }
.header-stats { display: flex; gap: 1.5rem; }
.stat { text-align: right; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.member-banner { background: linear-gradient(135deg,rgba(29,158,117,0.15),rgba(29,158,117,0.05)); border-bottom: 1px solid rgba(29,158,117,0.3); padding: 12px 2rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 13px; color: #9fdfc8; }
.member-banner strong { color: var(--green); }
.member-banner .copy-link { margin-left: auto; background: rgba(29,158,117,0.2); border: 1px solid var(--green); color: var(--green); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
.toolbar { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 180px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 12px; outline: none; transition: border-color 0.15s; }
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text3); }
.filter-btn { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 6px 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-btn:hover { color: var(--text); }
.filter-btn.active { background: rgba(245,200,66,0.12); border-color: var(--accent); color: var(--accent); }
.pending-bar { padding: 8px 2rem; background: rgba(245,200,66,0.06); border-bottom: 1px solid rgba(245,200,66,0.15); font-size: 12px; color: var(--accent); display: none; }
.pending-bar.show { display: block; }
.main { padding: 1.5rem 2rem; max-width: 860px; margin: 0 auto; }
.sort-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
.member-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
.member-card:hover { border-color: var(--border2); }
.member-card.rank-top { border-left: 3px solid var(--green); }
.member-card.rank-bot { border-left: 3px solid var(--red); }
.member-card.is-me { border-color: rgba(29,158,117,0.4); }
.card-main { padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text3); min-width: 28px; text-align: right; }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.member-info { flex: 1; min-width: 100px; }
.member-name { font-size: 14px; font-weight: 600; }
.member-user { font-size: 12px; color: var(--text2); }
.me-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; background: rgba(29,158,117,0.2); color: var(--green); border-radius: 4px; padding: 1px 5px; letter-spacing: 0.5px; vertical-align: middle; margin-left: 4px; }
.score-pill { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; padding: 2px 10px; border-radius: 99px; letter-spacing: 1px; }
.score-pos { background: rgba(29,158,117,0.15); color: var(--green); }
.score-neg { background: rgba(226,75,74,0.15); color: var(--red); }
.score-neu { background: var(--bg3); color: var(--text3); }
.votes-row { display: flex; gap: 6px; }
.vote-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.vote-btn:hover { background: var(--bg); }
.vote-btn.voted-green { background: rgba(29,158,117,0.12); border-color: var(--green); color: var(--green); }
.vote-btn.voted-red { background: rgba(226,75,74,0.12); border-color: var(--red); color: var(--red); }
.vote-btn.pending { opacity: 0.65; }
.defense-preview { margin: 0 16px 10px; padding: 8px 12px; background: rgba(29,158,117,0.07); border-left: 2px solid var(--green); border-radius: 0 6px 6px 0; font-size: 12px; color: #9fdfc8; line-height: 1.5; font-style: italic; }
.defense-preview .defense-label { font-size: 10px; font-style: normal; text-transform: uppercase; letter-spacing: 1px; color: var(--green); font-weight: 600; margin-bottom: 3px; }
.expand-btn { background: none; border: none; color: var(--text3); font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 0 16px 10px; display: block; transition: color 0.15s; }
.expand-btn:hover { color: var(--text2); }
.comments-section { border-top: 1px solid var(--border); padding: 12px 16px; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; } }
.comment-item { font-size: 12px; padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; line-height: 1.5; }
.comment-defense { background: rgba(29,158,117,0.08); border-left: 2px solid var(--green); color: #9fdfc8; }
.comment-accuse { background: rgba(226,75,74,0.08); border-left: 2px solid var(--red); color: #f5a0a0; }
.comment-own-defense { background: rgba(29,158,117,0.12); border-left: 3px solid var(--green); color: #9fdfc8; }
.comment-meta { font-size: 10px; opacity: 0.6; margin-bottom: 3px; }
.own-defense-edit { margin-top: 10px; padding: 10px 12px; background: rgba(29,158,117,0.06); border: 1px solid rgba(29,158,117,0.2); border-radius: 8px; }
.own-defense-edit label { font-size: 11px; color: var(--green); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; font-weight: 600; }
.own-defense-edit textarea { width: 100%; background: var(--bg3); border: 1px solid rgba(29,158,117,0.3); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 10px; resize: vertical; min-height: 60px; outline: none; transition: border-color 0.15s; }
.own-defense-edit textarea:focus { border-color: var(--green); }
.own-defense-edit textarea::placeholder { color: var(--text3); }
.defense-area { margin-top: 10px; }
.defense-area label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
.defense-area textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 10px; resize: vertical; min-height: 52px; outline: none; transition: border-color 0.15s; }
.defense-area textarea:focus { border-color: var(--green); }
.defense-area textarea::placeholder { color: var(--text3); }
.accuse-row { display: flex; gap: 6px; margin-top: 8px; }
.accuse-row input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 10px; outline: none; transition: border-color 0.15s; }
.accuse-row input:focus { border-color: var(--red); }
.accuse-row input::placeholder { color: var(--text3); }
.btn-small { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 8px; cursor: pointer; border: none; transition: opacity 0.15s; white-space: nowrap; }
.btn-small:hover { opacity: 0.8; }
.btn-small:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-save { background: rgba(29,158,117,0.2); color: var(--green); margin-top: 6px; }
.btn-accuse { background: rgba(226,75,74,0.2); color: var(--red); }
.btn-defend { background: rgba(29,158,117,0.2); color: var(--green); }
.no-results { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }
.loading { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
.loading-dot { display: inline-block; animation: blink 1s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 16px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }
.queue-indicator { position: fixed; bottom: 1.5rem; left: 1.5rem; background: var(--bg3); border: 1px solid var(--accent); border-radius: 10px; padding: 8px 14px; font-size: 12px; color: var(--accent); opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 998; }
.queue-indicator.show { opacity: 1; transform: translateY(0); }
@media (max-width: 600px) {
  .header { padding: 1.25rem; }
  .main { padding: 1rem; }
  .toolbar { padding: 0.75rem 1rem; }
  .votes-row { margin-left: auto; }
  .member-banner { padding: 10px 1rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-title">
    <h1>TRIBUNAL <span>POPOKE</span></h1>
    <p>Vota quién se queda y quién se va del canal</p>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="stat-members">—</div><div class="stat-label">miembros</div></div>
    <div class="stat"><div class="stat-num" id="stat-votes">—</div><div class="stat-label">votos totales</div></div>
    <div class="stat"><div class="stat-num" id="stat-pending" style="color:var(--accent)">—</div><div class="stat-label">sin votar</div></div>
  </div>
</header>

<div id="member-banner"></div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="🔍 Buscar miembro..." oninput="onSearch()" />
  <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Todos</button>
  <button class="filter-btn" id="filter-top" onclick="setFilter('top')">👍 Más queridos</button>
  <button class="filter-btn" id="filter-bot" onclick="setFilter('bot')">👎 Más odiados</button>
  <button class="filter-btn" id="filter-novote" onclick="setFilter('novote')">Sin votos</button>
  <button class="filter-btn" id="filter-unvoted" onclick="setFilter('unvoted')">No has votado</button>
</div>

<div class="pending-bar" id="pending-bar"></div>

<div class="main">
  <div class="sort-label">Ordenados por puntuación neta — verde arriba, rojo abajo</div>
  <div id="list"><div class="loading"><span class="loading-dot">•</span><span class="loading-dot">•</span><span class="loading-dot">•</span></div></div>
</div>

<div class="toast" id="toast"></div>
<div class="queue-indicator" id="queue-indicator">⏳ Guardando votos...</div>

<script>
const SUPABASE_URL = 'https://wqgfzealpghlripqgqlg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxZ2Z6ZWFscGdobHJpcHFncWxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MzU5NjgsImV4cCI6MjA5MzIxMTk2OH0.PiU7nBt5xS7qjNLroa3MgX-LkLCT_6MkfPG5p1pRp80';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MY_ID = new URLSearchParams(window.location.search).get('member') || null;

let members = [], votes = {}, defenses = {}, accusations = {};
let userVotes = JSON.parse(localStorage.getItem('uv_tribunal') || '{}');
let expanded = {}, activeFilter = 'all', searchQuery = '';
let voteQueue = {}, queueTimer = null, queueRunning = false;

const AVATAR_COLORS = [
  ['#1a2a3a','#5ba4d4'],['#1a2218','#5db87a'],['#2a1a1a','#d47a5b'],
  ['#231a2a','#9a70d4'],['#2a2218','#d4b040'],['#1a2228','#5bc4c4'],
];
function getAvatarStyle(id) {
  const i = (id.charCodeAt(0)+id.charCodeAt(id.length-1)) % AVATAR_COLORS.length;
  return `background:${AVATAR_COLORS[i][0]};color:${AVATAR_COLORS[i][1]}`;
}
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function score(m) { const v=votes[m.id]||{green:0,red:0}; return v.green-v.red; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, type='ok') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+type;
  setTimeout(()=>el.className='toast',2500);
}
function showQueue(show) {
  document.getElementById('queue-indicator').className='queue-indicator'+(show?' show':'');
}

async function fetchAllPaged(table, cols) {
  let all=[], from=0;
  while(true) {
    const {data,error}=await sb.from(table).select(cols).range(from,from+999);
    if(error||!data||!data.length) break;
    all=all.concat(data);
    if(data.length<1000) break;
    from+=1000;
  }
  return all;
}

async function loadAll() {
  const [mData, vData, dData, aData] = await Promise.all([
    sb.from('members').select('id,name,username,defense,created_at').order('created_at').then(r=>r.data||[]),
    fetchAllPaged('votes','member_id,type'),
    fetchAllPaged('defenses','*'),
    fetchAllPaged('accusations','*'),
  ]);

  members = mData;
  votes = {};
  for(const v of vData) { if(!votes[v.member_id]) votes[v.member_id]={green:0,red:0}; votes[v.member_id][v.type]++; }
  defenses = {};
  for(const d of dData) { if(!defenses[d.member_id]) defenses[d.member_id]=[]; defenses[d.member_id].push(d); }
  accusations = {};
  for(const a of aData) { if(!accusations[a.member_id]) accusations[a.member_id]=[]; accusations[a.member_id].push(a); }

  if(MY_ID) {
    const me=members.find(m=>m.id===MY_ID);
    if(me) {
      const url=window.location.origin+window.location.pathname+'?member='+MY_ID;
      document.getElementById('member-banner').innerHTML=`<div class="member-banner">
        ⚖️ Estás en el Tribunal como <strong>${escHtml(me.name)}</strong> — puedes editar tu propia defensa
        <button class="copy-link" onclick="navigator.clipboard.writeText('${url}').then(()=>toast('Link copiado ✓'))">Copiar mi link</button>
      </div>`;
    }
  }

  // Tiempo real
  sb.channel('rt-votes')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'votes'},p=>{
      const {member_id,type}=p.new;
      if(!votes[member_id]) votes[member_id]={green:0,red:0};
      votes[member_id][type]++;
      updateStats(); softRender(member_id);
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'votes'},p=>{
      const {member_id,type}=p.old||{};
      if(member_id&&votes[member_id]) { votes[member_id][type]=Math.max(0,votes[member_id][type]-1); updateStats(); softRender(member_id); }
    })
    .subscribe();

  updateStats();
  render();

  if(MY_ID) setTimeout(()=>{
    const el=document.getElementById('card-'+MY_ID);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }, 500);
}

function softRender(memberId) {
  // Actualiza solo los contadores sin re-renderizar todo
  const el=document.getElementById('card-'+memberId);
  if(!el) return;
  const v=votes[memberId]||{green:0,red:0};
  const sc=v.green-v.red;
  const prevSc=parseInt(el.dataset.score||'0');
  if(sc!==prevSc) { render(); return; } // orden cambió, render completo
  el.dataset.score=sc;
  const btns=el.querySelectorAll('.vote-btn');
  if(btns[0]) { const t=btns[0].innerHTML; btns[0].innerHTML=t.replace(/👍 \d+/,`👍 ${v.green}`); }
  if(btns[1]) { const t=btns[1].innerHTML; btns[1].innerHTML=t.replace(/👎 \d+/,`👎 ${v.red}`); }
}

function updateStats() {
  document.getElementById('stat-members').textContent=members.length;
  let total=0; for(const v of Object.values(votes)) total+=v.green+v.red;
  document.getElementById('stat-votes').textContent=total.toLocaleString();
  const unvoted=members.filter(m=>!userVotes[m.id]).length;
  document.getElementById('stat-pending').textContent=unvoted;
  const pb=document.getElementById('pending-bar');
  if(unvoted>0) { pb.textContent=`⚡ Aún no has votado a ${unvoted} miembro${unvoted===1?'':'s'}`; pb.className='pending-bar show'; }
  else pb.className='pending-bar';
}

function getSorted() { return [...members].sort((a,b)=>score(b)-score(a)); }

function getFiltered() {
  let list=getSorted();
  if(searchQuery) { const q=searchQuery.toLowerCase(); list=list.filter(m=>m.name.toLowerCase().includes(q)||(m.username||'').toLowerCase().includes(q)); }
  if(activeFilter==='top') list=list.filter(m=>score(m)>0);
  else if(activeFilter==='bot') list=list.filter(m=>score(m)<0);
  else if(activeFilter==='novote') list=list.filter(m=>{ const v=votes[m.id]; return !v||v.green+v.red===0; });
  else if(activeFilter==='unvoted') list=list.filter(m=>!userVotes[m.id]);
  return list;
}

function setFilter(f) {
  activeFilter=f;
  ['all','top','bot','novote','unvoted'].forEach(k=>{ document.getElementById('filter-'+k).className='filter-btn'+(k===f?' active':''); });
  render();
}
function onSearch() { searchQuery=document.getElementById('search').value.trim(); render(); }

function render() {
  const list=document.getElementById('list');
  const sorted=getSorted();
  const filtered=getFiltered();
  if(!filtered.length) { list.innerHTML='<div class="no-results">No se encontraron miembros</div>'; return; }

  list.innerHTML=filtered.map(m=>{
    const gi=sorted.findIndex(x=>x.id===m.id);
    const v=votes[m.id]||{green:0,red:0};
    const sc=score(m);
    const scClass=sc>0?'score-pill score-pos':sc<0?'score-pill score-neg':'score-pill score-neu';
    const scTxt=sc>0?'+'+sc:''+sc;
    const isMe=MY_ID===m.id;
    const cardClass=[(gi===0?'member-card rank-top':gi===sorted.length-1?'member-card rank-bot':'member-card'),isMe?'is-me':''].join(' ');
    const vg=userVotes[m.id]==='green', vr=userVotes[m.id]==='red';
    const isPending=!!voteQueue[m.id], isOpen=expanded[m.id];
    const accList=accusations[m.id]||[], defList=defenses[m.id]||[];

    let comments='';
    if(m.defense) comments+=`<div class="comment-item comment-own-defense"><div class="comment-meta">✋ Defensa propia</div>${escHtml(m.defense)}</div>`;
    defList.forEach(d=>{ comments+=`<div class="comment-item comment-defense"><div class="comment-meta">🛡️ Defensa</div>${escHtml(d.text)}</div>`; });
    accList.forEach(a=>{ comments+=`<div class="comment-item comment-accuse"><div class="comment-meta">⚡ Acusación</div>${escHtml(a.text)}</div>`; });

    const expandHtml=isOpen?`<div class="comments-section">
      ${comments||'<div style="color:var(--text3);font-size:12px;padding:4px 0">Sin defensas ni acusaciones aún</div>'}
      ${isMe?`<div class="own-defense-edit"><label>✏️ Tu defensa (solo tú puedes editarla)</label>
        <textarea id="def-${m.id}" placeholder="¿Por qué deberías quedarte?">${escHtml(m.defense||'')}</textarea>
        <button class="btn-small btn-save" onclick="saveDefense('${m.id}')">Guardar defensa</button></div>`:''}
      <div class="defense-area" style="margin-top:10px">
        <label>Defender a ${escHtml(m.name.split(' ')[0])}</label>
        <textarea id="defe-${m.id}" placeholder="¿Por qué debería quedarse?" rows="2"></textarea>
        <div style="display:flex;gap:6px;margin-top:6px"><button class="btn-small btn-defend" onclick="addDefense('${m.id}')">+ Defender</button></div>
      </div>
      <div class="accuse-row" style="margin-top:8px">
        <input id="acc-${m.id}" placeholder="Razón para echarlo..." maxlength="200" />
        <button class="btn-small btn-accuse" onclick="addAccusation('${m.id}')">+ Acusación</button>
      </div>
    </div>`:'';

    return `<div class="${cardClass}" id="card-${m.id}" data-score="${sc}">
      <div class="card-main">
        <span class="rank-num">#${gi+1}</span>
        <div class="avatar" style="${getAvatarStyle(m.id)}">${initials(m.name)}</div>
        <div class="member-info">
          <div class="member-name">${escHtml(m.name)}${isMe?'<span class="me-badge">Tú</span>':''} <span class="${scClass}">${scTxt}</span></div>
          <div class="member-user">${escHtml(m.username)}</div>
        </div>
        <div class="votes-row">
          <button class="vote-btn ${vg?'voted-green':''} ${isPending?'pending':''}" onclick="vote('${m.id}','green')">👍 ${v.green}</button>
          <button class="vote-btn ${vr?'voted-red':''} ${isPending?'pending':''}" onclick="vote('${m.id}','red')">👎 ${v.red}</button>
        </div>
      </div>
      ${m.defense&&!isOpen?`<div class="defense-preview"><div class="defense-label">Su defensa</div>${escHtml(m.defense)}</div>`:''}
      <button class="expand-btn" onclick="toggleExpand('${m.id}')">${isOpen?'▲ Ocultar':`▼ Defensas y acusaciones (${defList.length+accList.length+(m.defense?1:0)})`}</button>
      ${expandHtml}
    </div>`;
  }).join('');
}

function vote(memberId, type) {
  const prev=userVotes[memberId]||null;
  const newType=prev===type?null:type;
  if(!votes[memberId]) votes[memberId]={green:0,red:0};
  if(prev) votes[memberId][prev]=Math.max(0,votes[memberId][prev]-1);
  if(newType) votes[memberId][newType]++;
  userVotes[memberId]=newType;
  localStorage.setItem('uv_tribunal',JSON.stringify(userVotes));
  voteQueue[memberId]={type:newType,prev};
  updateStats(); render();
  clearTimeout(queueTimer);
  queueTimer=setTimeout(flushVoteQueue,600);
  showQueue(true);
}

async function flushVoteQueue() {
  if(queueRunning) { queueTimer=setTimeout(flushVoteQueue,300); return; }
  const batch={...voteQueue}; voteQueue={}; queueRunning=true;
  await Promise.all(Object.entries(batch).map(async([memberId,{type,prev}])=>{
    try {
      if(prev) await sb.from('votes').delete().eq('member_id',memberId).eq('type',prev).limit(1);
      if(type) await sb.from('votes').insert({member_id:memberId,type});
    } catch(e) { console.error('Vote error',e); }
  }));
  queueRunning=false;
  showQueue(false);
  if(Object.keys(voteQueue).length>0) { queueTimer=setTimeout(flushVoteQueue,300); showQueue(true); }
}

function toggleExpand(id) { expanded[id]=!expanded[id]; render(); }

async function saveDefense(memberId) {
  if(MY_ID!==memberId) return;
  const el=document.getElementById('def-'+memberId); if(!el) return;
  const text=el.value.trim(), btn=el.nextElementSibling; btn.disabled=true;
  const {error}=await sb.from('members').update({defense:text}).eq('id',memberId);
  if(!error) { const m=members.find(x=>x.id===memberId); if(m) m.defense=text; toast('Defensa guardada ✓'); render(); }
  else { toast('Error al guardar','err'); btn.disabled=false; }
}

async function addDefense(memberId) {
  const el=document.getElementById('defe-'+memberId); if(!el) return;
  const text=el.value.trim(); if(!text) { toast('Escribe algo','err'); return; }
  const {data,error}=await sb.from('defenses').insert({member_id:memberId,text}).select().single();
  if(!error&&data) { if(!defenses[memberId]) defenses[memberId]=[]; defenses[memberId].push(data); el.value=''; toast('Defensa añadida 🛡️'); render(); }
  else toast('Error al añadir','err');
}

async function addAccusation(memberId) {
  const el=document.getElementById('acc-'+memberId); if(!el) return;
  const text=el.value.trim(); if(!text) { toast('Escribe algo','err'); return; }
  const {data,error}=await sb.from('accusations').insert({member_id:memberId,text}).select().single();
  if(!error&&data) { if(!accusations[memberId]) accusations[memberId]=[]; accusations[memberId].push(data); el.value=''; toast('Acusación añadida ⚡'); render(); }
  else toast('Error al añadir','err');
}

loadAll();
</script>
